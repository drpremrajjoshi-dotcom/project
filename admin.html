<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRJ Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-login { background-color: #1a73e8; color: white; }
        .btn-upload { background-color: #34a853; color: white; }
        .btn-delete { background-color: #ea4335; color: white; }
        #adminTools { display: none; border-top: 2px solid #eee; margin-top: 20px; padding-top: 20px; }
        #status { text-align: center; margin-top: 15px; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Admin Access</h2>
    
    <div id="loginSection">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="user" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass" placeholder="Enter password">
        </div>
        <button class="btn-login" onclick="checkLogin()">Login</button>
    </div>

    <div id="adminTools">
        <div class="input-group">
            <label>GitHub Personal Token</label>
            <input type="password" id="ghToken" placeholder="Paste your GitHub Token here">
        </div>

        <hr>

        <h3>Manage Photos</h3>
        <div class="input-group">
            <label>Upload Photo</label>
            <input type="file" id="fileInput" accept="image/*">
            <button class="btn-upload" onclick="handleUpload()">Upload to Images Folder</button>
        </div>

        <div class="input-group" style="margin-top: 25px;">
            <label>Delete Photo (by name)</label>
            <input type="text" id="deleteName" placeholder="e.g., photo1.jpg">
            <button class="btn-delete" onclick="handleDelete()">Delete Permanently</button>
        </div>
    </div>

    <p id="status"></p>
</div>

<script>
    const REPO = "drpremrajjoshi-dotcom/project";
    const BRANCH = "master";

    // 1. Check Login Credentials
    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const status = document.getElementById('status');

        if (u === "admin" && p === "prj100") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminTools').style.display = 'block';
            status.style.color = "green";
            status.innerText = "Login Successful.";
        } else {
            status.style.color = "red";
            status.innerText = "Invalid credentials!";
        }
    }

    // 2. Handle Photo Upload
    async function handleUpload() {
        const token = document.getElementById('ghToken').value;
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        if (!token) return alert("Paste your GitHub Token first!");
        if (!fileInput.files[0]) return alert("Select a file!");

        const file = fileInput.files[0];
        const reader = new FileReader();
        status.innerText = "Uploading...";

        reader.onload = async () => {
            const content = reader.result.split(',')[1];
            const path = `images/${file.name}`;

            const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Admin upload", content: content, branch: BRANCH })
            });

            if (response.ok) {
                status.innerText = "✅ Uploaded! Site will update shortly.";
            } else {
                status.innerText = "❌ Error. Check token or if file exists.";
            }
        };
        reader.readAsDataURL(file);
    }

    // 3. Handle Photo Delete
    async function handleDelete() {
        const token = document.getElementById('ghToken').value;
        const fileName = document.getElementById('deleteName').value;
        const status = document.getElementById('status');

        if (!token || !fileName) return alert("Token and Filename required!");

        status.innerText = "Deleting...";
        const path = `images/${fileName}`;

        // Get File SHA first
        const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            headers: { 'Authorization': `token ${token}` }
        });

        if (!getRes.ok) return status.innerText = "❌ File not found.";
        const data = await getRes.json();

        // Perform Delete
        const delRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            method: 'DELETE',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Admin delete", sha: data.sha, branch: BRANCH })
        });

        if (delRes.ok) {
            status.innerText = "✅ File deleted successfully.";
        } else {
            status.innerText = "❌ Error deleting file.";
        }
    }
</script>

</body>
</html>
