backend:
  name: git-gateway
  branch: master

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - label: "Homepage Data"
        name: "data"
        file: "data.json"
        fields:
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Biography", name: "aboutP", widget: "markdown" }
          - label: "Education"
            name: "education"
            widget: "list"
            fields:
              - { label: "Degree Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }