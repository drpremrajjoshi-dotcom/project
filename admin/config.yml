backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "homepage"
    label: "Homepage Data"
    files:
      - file: "data.json"
        label: "Main Content"
        name: "main_content"
        fields:
          - { label: "Site Logo", name: "logo", widget: "image" }
          - label: "Home Slider"
            name: "slider_images"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtext", widget: "string" }
              - { label: "Background Image", name: "image", widget: "image" }
          - label: "About Me"
            name: "about_section"
            widget: "object"
            fields:
              - { label: "Biography", name: "biography", widget: "text" }
              - { label: "Profile Photo", name: "photo", widget: "image" }
          - label: "Education"
            name: "education"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Icon", name: "image", widget: "image" }
          - label: "Experience"
            name: "experience"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Icon", name: "image", widget: "image" }
