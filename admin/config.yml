collections:
  - name: "homepage"
    label: "Homepage Data"
    files:
      - file: "data.json"
        label: "Main Content"
        name: "main_content"
        fields:
          - { label: "Site Logo", name: "logo", widget: "image" }
          
          # This matches the 'slider_images' in your script
          - label: "Home Slider"
            name: "slider_images"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtext", widget: "string" }
              - { label: "Background Image", name: "image", widget: "image" }

          # This matches 'about_section'
          - label: "About Me"
            name: "about_section"
            widget: "object"
            fields:
              - { label: "Biography", name: "biography", widget: "text" }
              - { label: "Profile Photo", name: "photo", widget: "image" }

          # This matches 'education'
          - label: "Educational Journey"
            name: "education"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Icon/Image", name: "image", widget: "image" }
