# 1. Backend Configuration (Connects to your GitHub repo)
backend:
  name: git-gateway
  branch: main # or master, depending on your GitHub branch name

# 2. Media & Public Folder (Where images are saved and accessed)
media_folder: "images"      # Folder in your repo where images will be uploaded
public_folder: "images"     # The path the website will use to find those images

# 3. Media Library Configuration
media_library:
  name: uploadcare # or leave as default if not using an external service
  config:
    publicKey: demopublickey 

# 4. Content Collections
collections:
  - name: "homepage"
    label: "Homepage Data"
    files:
      - file: "data.json"
        label: "Main Content"
        name: "main_content"
        fields:
          - { label: "Site Logo", name: "logo", widget: "image" }
          
          - label: "Home Slider"
            name: "slider_images"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtext", widget: "string" }
              - { label: "Background Image", name: "image", widget: "image" }

          - label: "About Me"
            name: "about_section"
            widget: "object"
            fields:
              - { label: "Biography", name: "biography", widget: "text" }
              - { label: "Profile Photo", name: "photo", widget: "image" }

          - label: "Educational Journey"
            name: "education"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Icon/Image", name: "image", widget: "image" }

          - label: "Professional Experience"
            name: "experience"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Icon/Image", name: "image", widget: "image" }
