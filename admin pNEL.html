<!DOCTYPE html>
<html>
<head>
    <title>My Private Admin Panel</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        #status { color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Website Manager</h2>
    
    <input type="password" id="ghToken" placeholder="Paste your GitHub Token here">
    <hr>

    <h3>Upload New Photo</h3>
    <input type="file" id="fileInput">
    <button onclick="uploadToGithub()">Upload to Site</button>
    
    <p id="status"></p>
</div>

<script>
async function uploadToGithub() {
    const token = document.getElementById('ghToken').value;
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    
    if (!token) return alert("Please enter your token first!");
    if (!fileInput.files[0]) return alert("Please select a photo.");

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    status.innerText = "Processing...";

    reader.onload = async () => {
        const content = reader.result.split(',')[1];
        const path = `images/${file.name}`; // Saves to your 'images' folder
        const repo = "drpremrajjoshi-dotcom/project";

        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: "Uploaded via Admin Panel",
                content: content,
                branch: "master" 
            })
        });

        if (response.ok) {
            status.innerText = "✅ Success! Site will update in a minute.";
        } else {
            status.innerText = "❌ Error. Check if token is correct or file already exists.";
        }
    };
    reader.readAsDataURL(file);
}
</script>
</body>
</html>
