<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Prem Raj Joshi</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    background: white;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 1000;
}

/* LEFT AREA */
.left {
    display: flex;
    align-items: center;
}

/* LOGO */
.logo-img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
}

/* NAME */
.name-main {
    margin-left: 12px;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    color: #222;
}

/* NAV */
.nav {
    display: flex;
    align-items: center;
}

.nav a {
    margin: 0 8px;
    text-decoration: none;
    color: #222;
    font-weight: 500;
}

.nav a:hover {
    color: #007bff;
}

/* SOCIAL ICONS (REAL BRAND COLORS) */
.social {
    display: flex;
    align-items: center;
    margin-left: 10px;
}

.social a {
    margin-left: 10px;
    font-size: 18px;
    text-decoration: none;
}

/* Brand Colors */
.facebook { color: #1877F2; }
.instagram { color: #E4405F; }
.tiktok { color: #000000; }
.twitter { color: #1DA1F2; }
.youtube { color: #FF0000; }

.social a:hover {
    transform: scale(1.1);
}

/* DATE TIME */
.datetime {
    margin-left: 15px;
    font-size: 12px;
    color: gray;
    text-align: right;
}

/* MENU */
.menu-toggle {
    display: none;
    font-size: 22px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
    .menu-toggle {
        display: block;
    }

    .nav {
        display: none;
        flex-direction: column;
        position: absolute;
        right: 0;
        top: 60px;
        background: white;
        width: 240px;
        padding: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .nav.active {
        display: flex;
    }

    .datetime {
        margin-top: 10px;
        text-align: left;
    }
}

section {
    padding: 60px 20px;
}
</style>
</head>

<body>

<header class="header" id="header">

    <!-- LEFT: LOGO + NAME -->
    <div class="left">
        <a href="">
            <img src="logo.jpg" class="logo-img" alt="Logo">
        </a>

        <a href="" class="name-main">
            Dr. Prem Raj Joshi
        </a>
    </div>

    <!-- MENU -->
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav class="nav" id="navMenu">

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Portfolio</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>

        <!-- SOCIAL ICONS -->
        <div class="social">
            <a href="https://www.facebook.com/share/17TLFwFPH1/" class="facebook" target="_blank">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="https://www.instagram.com/the_prem.rajj?igsh=cGZ2a3R2YjBsaWZo" class="instagram" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://www.tiktok.com/@prejo11" class="tiktok" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>

            <a href="https://x.com/PRJtweets2090" class="twitter" target="_blank">
                <i class="fab fa-x-twitter"></i>
            </a>

            <a href="https://youtube.com/@premrajjoshi11?si=nkaZ8EhjR5NGtwi0" class="youtube" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
        </div>

    </nav>

</header>

<!-- CONTENT -->
<section><h2>Home</h2></section>
<section><h2>About</h2></section>
<section><h2>Services</h2></section>
<section><h2>Contact</h2></section>

<script>
function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html>
