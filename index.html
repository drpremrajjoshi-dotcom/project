<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Prem Raj Joshi</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: 0.3s;
        }

        .header.scrolled {
            padding: 5px 20px;
        }

        .left {
            line-height: 1.2;
        }

        .name-top {
            font-size: 18px;
        }

        .name-main {
            font-size: 14px;
            font-weight: bold;
        }

        /* NAV */
        .nav {
            display: flex;
            align-items: center;
        }

        .nav a {
            margin: 0 8px;
            text-decoration: none;
            color: black;
            font-weight: 500;
        }

        .nav a:hover {
            color: blue;
        }

        /* SOCIAL */
        .social {
            margin-left: 10px;
        }

        .social a {
            margin-left: 5px;
            font-size: 12px;
        }

        /* DATE TIME */
        .datetime {
            margin-left: 10px;
            font-size: 12px;
            color: gray;
        }

        /* MENU ICON */
        .menu-toggle {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav {
                display: none;
                flex-direction: column;
                position: absolute;
                right: 0;
                top: 60px;
                background: white;
                width: 220px;
                padding: 15px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            }

            .nav.active {
                display: flex;
            }
        }

        /* PAGE CONTENT */
        section {
            padding: 60px 20px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header class="header" id="header">

    <div class="left">
        <div class="name-top">Prem Joshi</div>
        <div class="name-main">Dr. Prem Raj Joshi</div>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav class="nav" id="navMenu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Portfolio</a>
        <a href="#">Services</a>
        <a href="#">Tools</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>

        <div class="social">
            <a href="https://facebook.com" target="_blank">Facebook</a>
            <a href="https://instagram.com" target="_blank">Insta</a>
            <a href="https://tiktok.com" target="_blank">TikTok</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="https://youtube.com" target="_blank">YouTube</a>
        </div>

        <div class="datetime" id="datetime"></div>
    </nav>

</header>

<!-- SAMPLE CONTENT (so you can scroll) -->
<section>
    <h2>Home</h2>
    <p>Welcome to your website.</p>
</section>

<section>
    <h2>About</h2>
    <p>Write about yourself here.</p>
</section>

<section>
    <h2>Services</h2>
    <p>Your services here.</p>
</section>

<section>
    <h2>Contact</h2>
    <p>Your contact details.</p>
</section>

<!-- JAVASCRIPT -->
<script>
function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("active");
}

// Shrink header on scroll
window.addEventListener("scroll", function() {
    document.getElementById("header")
        .classList.toggle("scrolled", window.scrollY > 50);
});

// Live Date & Time
function updateTime() {
    const now = new Date();
    document.getElementById("datetime").innerText =
        now.toLocaleString();
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
